name: Build PortMaster package

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check VERSION matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(cat VERSION)"
          if [ "$tag" != "$version" ]; then
            echo "VERSION file ($version) does not match tag ($tag)" >&2
            exit 1
          fi

      - name: Build package
        run: bash scripts/build_portmaster.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cw.dojo
          path: cw.dojo.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" cw.dojo.zip \
            --title "CW Dojo $GITHUB_REF_NAME" --generate-notes ||
          gh release upload "$GITHUB_REF_NAME" cw.dojo.zip --clobber
